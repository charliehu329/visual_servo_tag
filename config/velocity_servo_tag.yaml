# velocity_servo_tag.yaml
#
# 单目/双目AprilTag检测和Franka关节速度命令节点的统一配置。


vision_double_node:
  ros__parameters:
    # 左右USB相机编号，部署前根据/dev/video*实际映射修改。
    left_camera_index: 0
    right_camera_index: 1

    camera_width: 640
    camera_height: 480
    camera_fps: 60.0

    # ROS 2特征和Zoom占位消息的目标发布频率。
    publish_rate_hz: 60.0

    tag_family: "tag36h11"
    target_tag_id: 0

    # 左右相机各自创建一个检测器。
    detector_threads_per_camera: 2
    quad_decimate: 1.0
    quad_sigma: 0.0
    refine_edges: true
    decode_sharpening: 0.25

    # 一阶低通滤波系数，1.0表示不滤波。
    uv_filter_alpha: 0.4

    # 检测结果超过该时间后，对应valid自动置零。
    feature_timeout_sec: 0.10

    # 左右有效结果时间差过大时，较旧一侧valid置零。
    max_pair_skew_sec: 0.05

    # USB相机打开失败后的重试间隔。
    camera_reopen_delay_sec: 2.0

    target_features_topic: "/vision_double/target_features"
    zoom_position_topic: "/vision_double/zoom_position_steps"

    # Stage 1节点会固定发布[0.0, 0.0] Zoom位置，不控制电机。
    # 是否显示左右相机OpenCV预览窗口。
    show_window: true


apriltag_detector:
  ros__parameters:
    camera_index: 2
    camera_width: 1920
    camera_height: 1080
    camera_fps: 60.0

    tag_family: "tag36h11"
    target_tag_id: 0

    detector_threads: 2
    quad_decimate: 1.0
    quad_sigma: 0.0
    refine_edges: true
    decode_sharpening: 0.25

    # 一阶低通滤波系数：
    # 1.0表示不滤波，数值越小越平滑。
    uv_filter_alpha: 0.4

    target_position_topic: "/apriltag_detector/target_position"
    show_window: true


velocity_command_node:
  ros__parameters:
    # 默认zero最安全。
    # 真正接收Simulink关节速度时由launch覆盖为topic。
    mode: "zero"

    publish_rate_hz: 120.0

    # 相对于FR3官方关节速度上限的最终保护比例。
    max_velocity_scale: 0.10

    # 底层命令桥接层的加速度限制，单位rad/s²。
    max_joint_accelerations:
      - 0.20
      - 0.20
      - 0.20
      - 0.20
      - 0.20
      - 0.20
      - 0.20

    # Simulink停止发布后，超过此时间开始平滑减速。
    target_velocity_timeout_sec: 0.15

    # Simulink直接发布七维关节速度。
    input_topic: "/simulink/target_joints_velocities"
    command_topic: "/joint_velocity_example_controller/commands"


# Stage 1 Simulink ROS 2包装模型接口。
# 这里集中记录接口约定；topic修改后需同步修改SLX中的ROS 2 Block。
simulink_ros2:
  ros__parameters:
    sample_time_sec: 0.008333333333333333
    vision_topic: "/vision_double/target_features"
    joint_state_topic: "/franka/joint_states"
    zoom_position_topic: "/vision_double/zoom_position_steps"
    reset_topic: "/simulink/reset"

    joint_velocity_topic: "/simulink/target_joints_velocities"
    zoom_step_rate_topic: "/simulink/zoom_step_rate_cmd"
    controller_status_topic: "/simulink/controller_status"

    # 这些数值由stereo_ibvs_config.m实际加载；此处只记录接口约定。
    joint_state_timeout_sec: 0.10
    vision_timeout_sec: 0.10
    target_loss_frame_limit: 3
    target_recovery_frame_count: 3
    target_valid_source: "validL"

    vision_message_length: 8
    joint_position_message_length: 7
    zoom_position_message_length: 2
    joint_velocity_message_length: 7
    zoom_step_rate_message_length: 2
    controller_status_message_length: 12
