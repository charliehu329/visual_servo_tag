# controllers.yaml
#
# Franka Research 3 实机 ros2_control 配置。
#
# 控制器：
#   1. joint_state_broadcaster
#   2. franka_robot_state_broadcaster
#   3. joint_velocity_example_controller
#
# joint_velocity_example_controller 会在配置阶段设置 Franka
# 碰撞行为，并以1 kHz向机器人硬件发送关节速度。

controller_manager:
  ros__parameters:
    # Franka底层控制周期。
    update_rate: 1000

    # 实时线程优先级。
    thread_priority: 98

    # 不因为普通Ubuntu调度偶尔超过1 ms而自动停用控制器。
    # Franka实机仍保留自身的通信与反射安全机制。
    overruns:
      manage: false
      print_warnings: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    franka_robot_state_broadcaster:
      type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

      state_interfaces:
        - robot_state

    joint_velocity_example_controller:
      type: franka_example_controllers/JointVelocityExampleController


franka_robot_state_broadcaster:
  ros__parameters:
    # 便利状态话题发布频率。
    convenience_publish_rate: 100


joint_velocity_example_controller:
  ros__parameters:
    # 当前机器人关节名没有额外前缀。
    arm_prefix: ""

    # false表示使用真实Franka硬件。
    gazebo: false

    # 底层1 kHz速度低通滤波系数。
    #
    # v_out = v_out + alpha * (v_target - v_out)
    #
    # 数值越小越平滑，但响应更慢。
    filter_coefficient: 0.01